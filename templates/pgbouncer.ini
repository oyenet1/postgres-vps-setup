[databases]
postgres = host=postgres port=5432 dbname=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 10000
default_pool_size = 100
server_lifetime = 3600
server_idle_timeout = 600
server_reset_query = DISCARD ALL

log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

# TLS settings via environment variables (see docker-compose.yml)
# CLIENT_TLS_SSLMODE, CLIENT_TLS_CERT_FILE, CLIENT_TLS_KEY_FILE
# SERVER_TLS_SSLMODE, SERVER_TLS_CA_FILE