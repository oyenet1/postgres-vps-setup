groups:
  - name: services
    interval: 30s
    rules:
      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: PostgreSQL exporter is down

      - alert: RedisExporterDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Redis exporter is down

      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Node exporter is down

      - alert: AppDown
        expr: up{job="apps"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "App {{ $labels.service }} is down"

  - name: database
    interval: 30s
    rules:
      - alert: PostgresHighConnections
        expr: sum(pg_stat_activity_count) > 240
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: PostgreSQL connection count is high

  - name: host
    interval: 30s
    rules:
      - alert: HostDiskAlmostFull
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) < 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host filesystem has less than 10 percent free space

      - alert: HostHighCpu
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host CPU is above 90 percent

      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host memory usage is above 90 percent
