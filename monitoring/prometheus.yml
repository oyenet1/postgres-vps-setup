global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert.rules.yml

# ─── Built-in service scrapes ────────────────────────────────────
# The infra stack's own services. App scrapes are loaded dynamically
# from /etc/prometheus/targets/*.json (file_sd_configs below).
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # ─── App scrapes (file_sd) ──────────────────────────────────────
  # Drop one *.json file per app in the targets/ directory:
  #
  #   [
  #     {
  #       "targets": ["<stack>_<service>:<port>"],
  #       "labels": {
  #         "job": "apps",
  #         "service": "<app-name>",
  #         "env": "production",
  #         "metrics_path": "/v1/metrics",
  #         "scheme": "http"
  #       }
  #     }
  #   ]
  #
  # Reload prometheus after editing:
  #   curl -X POST http://YOUR_VPS_IP:9090/-/reload
  - job_name: apps
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.json
        refresh_interval: 30s
