x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

secrets:
  pgbouncer_userlist:
    file: ./pgbouncer/userlist.generated.txt

configs:
  pgbouncer_ini:
    file: ./pgbouncer/pgbouncer.ini
  pg_hba:
    file: ./postgres_config/pg_hba.conf
  postgresql_conf:
    file: ./postgres_config/postgresql.conf
  pgadmin_servers:
    file: ./pgadmin/servers.json
  sentinel_entrypoint:
    file: ./redis/sentinel-entrypoint.sh
  haproxy_cfg:
    file: ./redis/haproxy.generated.cfg
  backup_script:
    file: ./templates/backup.sh
  rclone_conf:
    file: ./config/rclone/rclone.generated.conf
  initdb_sql:
    file: ./initdb/01-bootstrap.sql

services:
  postgres:
    image: ${POSTGRES_IMAGE:-infra/postgres:latest}
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-300}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - target: 5432
        published: ${POSTGRES_PORT:-5432}
        protocol: tcp
        mode: host
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    configs:
      - source: initdb_sql
        target: /docker-entrypoint-initdb.d/01-bootstrap.sql
        mode: 0444
      - source: pg_hba
        target: /etc/postgresql/pg_hba.conf
        mode: 0444
      - source: postgresql_conf
        target: /etc/postgresql/postgresql.conf
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: unless-stopped
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  pgbouncer:
    image: edoburu/pgbouncer:${PGBOUNCER_IMAGE_TAG:-v1.25.1-p0}
    logging: *default-logging
    ports:
      - target: 6432
        published: ${PGBOUNCER_PORT:-6543}
        protocol: tcp
        mode: host
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6432"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    configs:
      - source: pgbouncer_ini
        target: /etc/pgbouncer/pgbouncer.ini
        mode: 0444
    secrets:
      - source: pgbouncer_userlist
        target: /etc/pgbouncer/userlist.txt
        mode: 0400
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_IMAGE_TAG:-latest}
    logging: *default-logging
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - target: 80
        published: ${PGADMIN_PORT:-5050}
        protocol: tcp
        mode: host
    networks:
      - infra
    configs:
      - source: pgadmin_servers
        target: /pgadmin4/servers.json
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: unless-stopped

  redis-master:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    logging: *default-logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --masterauth
      - ${REDIS_PASSWORD}
    volumes:
      - redis_master_data:/data
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: unless-stopped

  redis-replica:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    logging: *default-logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --replicaof
      - redis-master
      - "6379"
      - --appendonly
      - "yes"
      - --replica-read-only
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --masterauth
      - ${REDIS_PASSWORD}
    volumes:
      - redis_replica_data:/data
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: unless-stopped

  redis-sentinel:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    logging: *default-logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SENTINEL_MASTER_NAME: ${REDIS_SENTINEL_MASTER_NAME:-dbmaster}
    command: ["/bin/sh", "/redis/sentinel-entrypoint.sh"]
    networks:
      - infra
    configs:
      - source: sentinel_entrypoint
        target: /redis/sentinel-entrypoint.sh
        mode: 0555
    deploy:
      mode: replicated
      replicas: 3
      restart_policy:
        condition: unless-stopped

  redis-proxy:
    image: haproxy:${HAPROXY_IMAGE_TAG:-2.9-alpine}
    logging: *default-logging
    ports:
      - target: 6379
        published: ${REDIS_PORT:-6379}
        protocol: tcp
        mode: host
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6379"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    configs:
      - source: haproxy_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: unless-stopped

  backup:
    image: ${INFRA_BACKUP_IMAGE:-infra/backup:latest}
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION: ${BACKUP_RETENTION:-2}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-43200}
      R2_BACKUP_ENABLED: ${R2_BACKUP_ENABLED:-false}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PREFIX: ${R2_PREFIX:-infra/}
      R2_MAX_BACKUPS_PER_DB: ${R2_MAX_BACKUPS_PER_DB:-2}
      RCLONE_CONFIG: /config/rclone/rclone.conf
    volumes:
      - backup_data:/backups
    command: ["/bin/sh", "-c", "while true; do /bin/sh /scripts/backup.sh; sleep ${BACKUP_INTERVAL_SECONDS:-43200}; done"]
    networks:
      - infra
    configs:
      - source: backup_script
        target: /scripts/backup.sh
        mode: 0555
      - source: rclone_conf
        target: /config/rclone/rclone.conf
        mode: 0400
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_IMAGE_TAG:-latest}
    logging: *default-logging
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - infra
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: unless-stopped
      placement:
        constraints:
          - node.role == manager

networks:
  infra:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  redis_master_data:
  redis_replica_data:
  pgadmin_data:
  backup_data:
