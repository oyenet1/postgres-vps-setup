x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

secrets:
  pgbouncer_userlist:
    file: ./pgbouncer/userlist.generated.txt

configs:
  pgbouncer_ini:
    file: ./pgbouncer/pgbouncer.ini
  pgbouncer_cert:
    file: ./pgbouncer/pgbouncer-cert.pem
  pgbouncer_key:
    file: ./pgbouncer/pgbouncer-key.pem
  pg_hba:
    file: ./postgres_config/pg_hba.conf
  postgresql_conf:
    file: ./postgres_config/postgresql.conf
  postgres_cert:
    file: ./postgres_config/server-cert.pem
  postgres_key:
    file: ./postgres_config/server-key.pem
  pgadmin_servers:
    file: ./pgadmin/servers.json
  sentinel_entrypoint:
    file: ./redis/sentinel-entrypoint.sh
  haproxy_cfg:
    file: ./redis/haproxy.generated.cfg
  backup_script:
    file: ./templates/backup.sh
  rclone_conf:
    file: ./config/rclone/rclone.generated.conf
  initdb_sql:
    file: ./initdb/01-bootstrap.sql
  initdb_auth_sh:
    file: ./initdb/02-pgbouncer-auth.sh
  loki_yaml:
    file: ./monitoring/loki.yml
  alloy_config:
    file: ./monitoring/alloy/config.alloy
  prometheus_yaml:
    file: ./monitoring/prometheus.yml
  alert_rules:
    file: ./monitoring/alert.rules.yml
  alertmanager_yaml:
    file: ./monitoring/alertmanager.generated.yml
  grafana_dashboards:
    file: ./grafana/provisioning/dashboards/dashboards.yml
  grafana_datasources:
    file: ./grafana/provisioning/datasources/datasources.yml

services:
  postgres:
    image: ${POSTGRES_IMAGE:-infra/postgres:latest}
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      PGBOUNCER_AUTH_USER: ${PGBOUNCER_AUTH_USER:-pgbouncer_auth}
      PGBOUNCER_AUTH_PASSWORD: ${PGBOUNCER_AUTH_PASSWORD}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-300}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - target: 5432
        published: ${POSTGRES_PORT:-5432}
        protocol: tcp
        mode: host
      - target: 5432
        published: ${POSTGRES_PORT_DIRECT:-5544}
        protocol: tcp
        mode: host
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    configs:
      - source: initdb_sql
        target: /docker-entrypoint-initdb.d/01-bootstrap.sql
        mode: 0444
      - source: pg_hba
        target: /etc/postgresql/pg_hba.conf
        mode: 0444
      - source: initdb_auth_sh
        target: /docker-entrypoint-initdb.d/02-pgbouncer-auth.sh
        mode: 0444
      - source: postgresql_conf
        target: /etc/postgresql/postgresql.conf
        mode: 0644
      - source: postgres_cert
        target: /etc/postgresql/server-cert.pem
        mode: 0444
      - source: postgres_key
        target: /etc/postgresql/server-key.pem
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  pgbouncer:
    image: edoburu/pgbouncer:${PGBOUNCER_IMAGE_TAG:-v1.25.1-p0}
    logging: *default-logging
    ports:
      - target: 6432
        published: ${PGBOUNCER_PORT:-6543}
        protocol: tcp
        mode: host
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6432"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    configs:
      - source: pgbouncer_ini
        target: /etc/pgbouncer/pgbouncer.ini
        mode: 0444
      - source: pgbouncer_cert
        target: /etc/pgbouncer/server-cert.pem
        mode: 0444
      - source: pgbouncer_key
        target: /etc/pgbouncer/server-key.pem
        mode: 0444
    secrets:
      - source: pgbouncer_userlist
        target: /etc/pgbouncer/userlist.txt
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_IMAGE_TAG:-latest}
    logging: *default-logging
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - target: 80
        published: ${PGADMIN_PORT:-5050}
        protocol: tcp
        mode: host
    networks:
      - infra
    configs:
      - source: pgadmin_servers
        target: /pgadmin4/servers.json
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  redis-master:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    logging: *default-logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --masterauth
      - ${REDIS_PASSWORD}
    volumes:
      - redis_master_data:/data
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  redis-replica:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    logging: *default-logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --replicaof
      - redis-master
      - "6379"
      - --appendonly
      - "yes"
      - --replica-read-only
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --masterauth
      - ${REDIS_PASSWORD}
    volumes:
      - redis_replica_data:/data
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  redis-sentinel:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    logging: *default-logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SENTINEL_MASTER_NAME: ${REDIS_SENTINEL_MASTER_NAME:-dbmaster}
    command: ["/bin/sh", "/redis/sentinel-entrypoint.sh"]
    networks:
      - infra
    configs:
      - source: sentinel_entrypoint
        target: /redis/sentinel-entrypoint.sh
        mode: 0555
    deploy:
      mode: replicated
      replicas: 3
      restart_policy:
        condition: any

  redis-proxy:
    image: haproxy:${HAPROXY_IMAGE_TAG:-2.9-alpine}
    logging: *default-logging
    ports:
      - target: 6379
        published: ${REDIS_PORT:-6379}
        protocol: tcp
        mode: host
    networks:
      - infra
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6379"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    configs:
      - source: haproxy_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  backup:
    image: ${INFRA_BACKUP_IMAGE:-infra/backup:latest}
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION: ${BACKUP_RETENTION:-2}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-43200}
      R2_BACKUP_ENABLED: ${R2_BACKUP_ENABLED:-false}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PREFIX: ${R2_PREFIX:-infra/}
      R2_MAX_BACKUPS_PER_DB: ${R2_MAX_BACKUPS_PER_DB:-2}
      RCLONE_CONFIG: /config/rclone/rclone.conf
    volumes:
      - backup_data:/backups
    command: ["/bin/sh", "-c", "while true; do /bin/sh /scripts/backup.sh; sleep ${BACKUP_INTERVAL_SECONDS:-43200}; done"]
    networks:
      - infra
    configs:
      - source: backup_script
        target: /scripts/backup.sh
        mode: 0555
      - source: rclone_conf
        target: /config/rclone/rclone.conf
        mode: 0400
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:${POSTGRES_EXPORTER_IMAGE_TAG:-v0.17.1}
    logging: *default-logging
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      - infra
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  redis-exporter:
    image: oliver006/redis_exporter:${REDIS_EXPORTER_IMAGE_TAG:-v1.63.0}
    logging: *default-logging
    environment:
      REDIS_ADDR: redis://redis-proxy:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - infra
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_IMAGE_TAG:-v1.8.2}
    logging: *default-logging
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - infra
    deploy:
      mode: global
      restart_policy:
        condition: any

  loki:
    image: grafana/loki:${LOKI_IMAGE_TAG:-3.0.0}
    logging: *default-logging
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - loki_data:/loki
    ports:
      - target: 3100
        published: ${LOKI_PORT:-3100}
        protocol: tcp
        mode: host
    networks:
      - infra
    configs:
      - source: loki_yaml
        target: /etc/loki/loki.yml
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  alloy:
    image: grafana/alloy:${ALLOY_IMAGE_TAG:-v1.8.3}
    logging: *default-logging
    command: run /etc/alloy/config.alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - infra
    configs:
      - source: alloy_config
        target: /etc/alloy/config.alloy
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager

  alertmanager:
    image: prom/alertmanager:${ALERTMANAGER_IMAGE_TAG:-v0.27.0}
    logging: *default-logging
    volumes:
      - alertmanager_data:/alertmanager
    ports:
      - target: 9093
        published: ${ALERTMANAGER_PORT:-9093}
        protocol: tcp
        mode: host
    networks:
      - infra
    configs:
      - source: alertmanager_yaml
        target: /etc/alertmanager/alertmanager.yml
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG:-v2.53.3}
    logging: *default-logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    volumes:
      - prometheus_data:/prometheus
    ports:
      - target: 9090
        published: ${PROMETHEUS_PORT:-9090}
        protocol: tcp
        mode: host
    networks:
      - infra
    configs:
      - source: prometheus_yaml
        target: /etc/prometheus/prometheus.yml
        mode: 0444
      - source: alert_rules
        target: /etc/prometheus/alert.rules.yml
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

  grafana:
    image: grafana/grafana:${GRAFANA_IMAGE_TAG:-11.2.0}
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - target: 3000
        published: ${GRAFANA_PORT:-3030}
        protocol: tcp
        mode: host
    networks:
      - infra
    configs:
      - source: grafana_dashboards
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
        mode: 0444
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
        mode: 0444
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any

networks:
  infra:
    name: infra
    external: true
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  redis_master_data:
  redis_replica_data:
  pgadmin_data:
  backup_data:
  loki_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
