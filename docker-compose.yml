services:
  postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./ini.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - dbstack
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: pgbouncer
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      AUTH_TYPE: trust
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 100
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
      SERVER_RESET_QUERY: DISCARD ALL
      CLIENT_TLS_SSLMODE: disable
      SERVER_TLS_SSLMODE: disable
      LISTEN_ADDR: "0.0.0.0"
    ports:
      - "6543:5432"
    volumes:
      
      
      - ./userlist.txt:/etc/pgbouncer/userlist.txt
    networks:
      - dbstack
    depends_on:
      - postgres
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_SERVER_NAME: PostgreSQL
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dbstack
    restart: unless-stopped

  backup:
    image: ubuntu:latest
    container_name: backup
    volumes:
      - ./backups:/backups
      - ./templates/backup.sh:/backup.sh
      - ./templates/backup.cron:/backup.cron
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/rclone:/config/rclone:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      GOOGLE_DRIVE_REMOTE_NAME: ${GOOGLE_DRIVE_REMOTE_NAME}
      GOOGLE_DRIVE_FOLDER: ${GOOGLE_DRIVE_FOLDER}
      MAX_BACKUPS: ${MAX_BACKUPS:-3}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      MONITORING_ENABLED: ${MONITORING_ENABLED:-false}
    command: >
      bash -c "apt-get update && apt-get install -y cron rclone msmtp && crontab /backup.cron && cron && tail -f /dev/null"
    networks:
      - dbstack
    depends_on:
      - postgres
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - dbstack
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      - dbstack
    restart: unless-stopped
    depends_on:
      - prometheus
    profiles:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - dbstack
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  dbstack:
    driver: bridge

volumes:
  pgadmin_data:
  prometheus_data:
  grafana_data:
  alertmanager_data: