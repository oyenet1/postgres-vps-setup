services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - dbstack
    restart: unless-stopped

pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: pgbouncer
    ports:
      - "6543:6543"
    volumes:
      - ./pgbouncer_ssl:/etc/pgbouncer/ssl
      - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./userlist.txt:/etc/pgbouncer/userlist.txt
    networks:
      - dbstack
    depends_on:
      - postgres
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_SERVER_NAME: PostgreSQL
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dbstack
    restart: unless-stopped

  backup:
    image: ubuntu:latest
    container_name: backup
    volumes:
      - ./backups:/backups
      - ./templates/backup.sh:/backup.sh
      - ./templates/backup.cron:/backup.cron
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/rclone:/config/rclone:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      GOOGLE_DRIVE_REMOTE_NAME: ${GOOGLE_DRIVE_REMOTE_NAME}
      GOOGLE_DRIVE_FOLDER: ${GOOGLE_DRIVE_FOLDER}
    command: >
      bash -c "apt-get update && apt-get install -y cron rclone && crontab /backup.cron && cron && tail -f /dev/null"
    networks:
      - dbstack
    depends_on:
      - postgres
    restart: unless-stopped

networks:
  dbstack:
    driver: bridge

volumes:
  pgadmin_data: